<div class="bg-dark-navy min-vh-100 text-white">
  <!-- Top Bar -->
  <header class="bg-secondary-bg border-bottom border-secondary d-flex align-items-center px-4 sticky-top shadow-sm" style="height: 64px;">
    <button class="btn text-cyan p-2 rounded-circle hover-bg-navy" (click)="goBack()">
      <i class="bi bi-arrow-left fs-4"></i>
    </button>
    <h1 class="h5 fw-bold text-center flex-grow-1 mb-0 pe-5">Edit Tenant</h1>
  </header>

  <main class="container py-4" style="max-width: 700px; padding-bottom: 100px;">
    <div class="mb-4">
      <h2 class="h3 fw-bold mb-1">Edit Tenant Details</h2>
      <p class="text-white">Manage settings and metadata for this organization.</p>
    </div>

    <form (ngSubmit)="saveChanges()" #editForm="ngForm">
      <!-- Organization Profile -->
      <div class="card card-custom p-4 mb-4">
        <h3 class="h6 fw-bold text-cyan mb-4 d-flex align-items-center gap-2 border-bottom border-secondary pb-3">
          <i class="bi bi-building fs-5"></i>
          Organization Profile
        </h3>
        
        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase">Company Name</label>
          <input type="text" class="form-control p-3 text-white focus-cyan" 
                 name="name" [(ngModel)]="company.name" placeholder="Enter organization name" required>
        </div>

        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase d-flex justify-content-between">
            <span>Tenant ID / Domain</span>
            <span class="badge bg-secondary-bg border border-secondary text-white px-2 py-1" style="font-size: 0.6rem;">Read-only</span>
          </label>
          <input type="text" class="form-control p-3 text-white border-secondary" 
                 [value]="company.id" readonly style="background-color: rgba(142, 145, 150, 0.05) !important; cursor: not-allowed;">
        </div>

        <div class="d-flex justify-content-between align-items-center py-3 border-top border-secondary mt-2">
          <div>
            <label class="form-label text-white x-small fw-bold text-uppercase mb-1 d-block">Tenant Status</label>
            <span [ngClass]="company.isActive ? 'text-success' : 'text-warning'" class="small d-flex align-items-center gap-2">
              <span class="rounded-circle" [ngClass]="company.isActive ? 'bg-success' : 'bg-warning'" style="width: 8px; height: 8px;"></span>
              {{ company.isActive ? 'Active' : 'Inactive' }}
            </span>
          </div>
          <div class="form-check form-switch fs-4">
            <input class="form-check-input bg-secondary border-secondary custom-switch" type="checkbox" 
                   name="isActive" [(ngModel)]="company.isActive" role="switch">
          </div>
        </div>
      </div>

      <!-- Administration & Details -->
      <div class="card card-custom p-4 mb-4">
        <h3 class="h6 fw-bold text-cyan mb-4 d-flex align-items-center gap-2 border-bottom border-secondary pb-3">
          <i class="bi bi-shield-lock fs-5"></i>
          Administration & Details
        </h3>

        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase">Primary Admin Email</label>
          <div class="input-group overflow-hidden border border-secondary rounded-3">
            <span class="input-group-text bg-transparent border-0 text-white">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" class="form-control bg-transparent border-0 text-white p-3 focus-none" 
                   name="adminEmail" [(ngModel)]="company.adminEmail" placeholder="admin@company.com">
          </div>
          <small class="text-white mt-1 d-block" style="font-size: 0.7rem;">This user has full organizational control.</small>
        </div>

        <div class="mb-2">
          <label class="form-label text-white x-small fw-bold text-uppercase">Internal Notes</label>
          <textarea class="form-control p-3 text-white focus-cyan" rows="4" 
                    name="notes" [(ngModel)]="company.notes" placeholder="Add internal details..."></textarea>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="d-flex flex-column-reverse flex-md-row justify-content-end gap-3 pt-3">
        <button type="button" class="btn btn-outline-secondary px-5 py-3 fw-bold" (click)="goBack()">Cancel</button>
        <button type="submit" class="btn btn-cyan px-5 py-3 fw-bold shadow-cyan">Save Changes</button>
      </div>
    </form>
  </main>
</div>

<style>
  .x-small { font-size: 0.7rem; letter-spacing: 0.05em; }
  .focus-cyan:focus {
    border-color: var(--accent-cyan) !important;
    box-shadow: 0 0 0 1px var(--accent-cyan);
  }
  .focus-none:focus { box-shadow: none; background: transparent; }
  .shadow-cyan { box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
  
  .custom-switch:checked {
    background-color: var(--status-done) !important;
    border-color: var(--status-done) !important;
  }
</style>
