<div class="bg-dark-navy min-vh-100 text-white">
  <!-- Top Bar -->
  <header class="bg-secondary-bg border-bottom border-secondary d-flex align-items-center px-4 sticky-top shadow-sm" style="height: 64px;">
    <button class="btn text-cyan p-2 rounded-circle hover-bg-navy" (click)="goBack()">
      <i class="bi bi-arrow-left fs-4"></i>
    </button>
    <h1 class="h5 fw-bold text-center flex-grow-1 mb-0 pe-5">
      {{ isEditMode ? 'แก้ไขแผนก' : 'เพิ่มแผนกใหม่' }}
    </h1>
  </header>

  <main class="container py-4" style="max-width: 600px; padding-bottom: 100px;">
    <div class="mb-4 text-center">
      <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" 
           [style.background-color]="category.color_accent + '22'" 
           [style.color]="category.color_accent"
           [style.border]="'2px solid ' + category.color_accent"
           style="width: 80px; height: 80px;">
        <i class="bi {{ category.icon }} fs-1"></i>
      </div>
      <h2 class="h4 fw-bold">{{ category.name || 'ชื่อแผนก' }}</h2>
      <p class="text-white-50 small">ตัวอย่างการแสดงผลในหน้าแดชบอร์ด</p>
    </div>

    <form (ngSubmit)="saveCategory()" #categoryForm="ngForm">
      <div class="card card-custom p-4 mb-4">
        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase">ชื่อแผนก</label>
          <input type="text" class="form-control p-3 text-white focus-cyan" 
                 name="name" [(ngModel)]="category.name" placeholder="ระบุชื่อแผนก เช่น IT Support, Engineering" required>
        </div>

        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase mb-3">เลือกไอคอน</label>
          <div class="row g-2">
            @for (icon of availableIcons; track icon) {
              <div class="col-3">
                <button type="button" class="btn w-100 py-3 border-secondary card-custom text-white transition-all"
                        [class.active-icon]="category.icon === icon"
                        (click)="selectIcon(icon)">
                  <i class="bi {{ icon }} fs-4"></i>
                </button>
              </div>
            }
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label text-white x-small fw-bold text-uppercase mb-3">เลือกสี</label>
          <div class="d-flex flex-wrap gap-3">
            @for (color of availableColors; track color) {
              <div class="rounded-circle cursor-pointer transition-all color-swatch"
                   [style.background-color]="color"
                   [class.active-color]="category.color_accent === color"
                   (click)="selectColor(color)"
                   style="width: 36px; height: 36px;">
              </div>
            }
          </div>
        </div>
      </div>

      <div class="d-flex flex-column-reverse flex-sm-row gap-3 pt-3">
        <button type="button" class="btn btn-outline-secondary w-100 w-sm-auto px-5 py-3 fw-bold" (click)="goBack()">ยกเลิก</button>
        <button type="submit" class="btn btn-cyan w-100 w-sm-auto flex-grow-1 px-5 py-3 fw-bold shadow-cyan d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-save-fill"></i>
          {{ isEditMode ? 'บันทึกการแก้ไข' : 'สร้างแผนก' }}
        </button>
      </div>
    </form>
  </main>
</div>

<style>
  .x-small { font-size: 0.7rem; letter-spacing: 0.05em; }
  .active-icon {
    border-color: var(--accent-cyan) !important;
    background-color: rgba(0, 242, 255, 0.1) !important;
    color: var(--accent-cyan) !important;
  }
  .color-swatch {
    border: 3px solid transparent;
  }
  .color-swatch:hover {
    transform: scale(1.1);
  }
  .active-color {
    border-color: white !important;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }
  .shadow-cyan { box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
</style>
