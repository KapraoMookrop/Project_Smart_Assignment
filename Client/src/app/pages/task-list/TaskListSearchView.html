<div class="bg-dark-navy min-vh-100 text-white">
  <header class="bg-secondary-bg border-bottom border-secondary d-flex align-items-center px-4 sticky-top shadow-sm" style="height: 64px;">
    <h1 class="h5 fw-bold mb-0 text-cyan">{{ title }}</h1>
  </header>

  <main class="container py-4">
    <div class="row g-4">
      @if (tasks.length === 0) {
        <div class="col-12 text-center py-5">
          <i class="bi bi-clipboard-x fs-1 text-white-50 mb-3"></i>
          <p class="text-white-50">ไม่พบรายการงานในขณะนี้</p>
        </div>
      }

      @for (task of tasks; track task.task_id) {
        <div class="col-lg-4 col-md-6">
          <div class="card card-custom h-100 border-0 position-relative hover-glow transition-all">
            <div class="bg-cyan" style="height: 4px; width: 100%;"></div>
            <div class="card-body p-4 d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="badge rounded-pill bg-cyan bg-opacity-10 text-cyan border border-cyan border-opacity-25 px-2 py-1 small fw-normal">
                  {{ task.status }}
                </span>
                <span class="text-white-50 small">{{ task.created_at | date:'dd/MM/yyyy' }}</span>
              </div>

              <h5 class="fw-bold mb-2">{{ task.title }}</h5>
              <p class="text-white-50 small line-clamp-2 mb-4">{{ task.description }}</p>

              <div class="mt-auto pt-3 border-top border-secondary border-opacity-25 d-flex gap-2">
                <button class="btn btn-outline-cyan btn-sm flex-grow-1" (click)="viewDetails(task.task_id)">
                  รายละเอียด
                </button>
                
                @if (canEdit(task)) {
                  <button class="btn btn-outline-warning btn-sm" (click)="editTask(task.task_id)">
                    <i class="bi bi-pencil"></i>
                  </button>
                }

                @if (canDelete(task)) {
                  <button class="btn btn-outline-danger btn-sm" (click)="deleteTask(task.task_id)">
                    <i class="bi bi-trash"></i>
                  </button>
                }
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </main>
</div>

<style>
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
