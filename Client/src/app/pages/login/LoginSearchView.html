<div class="bg-dark-navy min-vh-100 d-flex flex-column align-items-center justify-content-center p-3 position-relative overflow-hidden">
  <!-- Background Decoration -->
  <div class="position-absolute translate-middle opacity-10 pointer-events-none" style="top: 50%; left: 50%; z-index: 0;">
    <div class="bg-cyan rounded-circle blur-150" style="width: 600px; height: 600px; filter: blur(150px);"></div>
  </div>

  <!-- Login Card -->
  <div class="card bg-secondary-bg border-secondary shadow-lg z-1 overflow-hidden" style="max-width: 450px; width: 100%; border-radius: 1.25rem;">
    <!-- Header -->
    <div class="card-body p-4 p-md-5 text-center">
      <img src="LOGO.png" alt="Logo" class="mb-4 bg-dark-navy p-2 rounded-3 border border-secondary shadow-sm" style="width: 80px; height: 80px;">
      <h1 class="h3 fw-bold text-white mb-2">TaskToGroup</h1>
      <p class="text-white small mb-4">ระบบจัดการงานอัจฉริยะสำหรับทีมประสิทธิภาพสูง</p>

      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="text-start">
        <!-- Email -->
        <div class="mb-4">
          <label class="form-label text-white x-small fw-bold text-uppercase ls-wide">อีเมล (Email Address)</label>
          <div class="input-group card-custom border-secondary overflow-hidden">
            <span class="input-group-text bg-transparent border-0 text-white">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" class="form-control bg-transparent border-0 text-white p-3 focus-none" 
                   name="email" [(ngModel)]="loginData.email" placeholder="ระบุอีเมลของคุณ" required>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <label class="form-label text-white x-small fw-bold text-uppercase ls-wide">รหัสผ่าน (Password)</label>
            <!-- <a href="#" class="text-cyan text-decoration-none x-small fw-bold">ลืมรหัสผ่าน?</a> -->
          </div>
          <div class="input-group card-custom border-secondary overflow-hidden">
            <span class="input-group-text bg-transparent border-0 text-white">
              <i class="bi bi-lock"></i>
            </span>
            <input [type]="isPasswordVisible ? 'text' : 'password'" class="form-control bg-transparent border-0 text-white p-3 focus-none" 
                   name="password" [(ngModel)]="loginData.password" placeholder="••••••••" required>
            <button class="btn border-0 text-white" type="button" (click)="togglePasswordVisibility()">
              <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button class="btn btn-cyan w-100 py-3 fw-bold fs-5 shadow-cyan mt-2 d-flex align-items-center justify-content-center gap-2" 
                type="submit" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm"></span>
            กำลังประมวลผล...
          } @else {
            เข้าสู่ระบบ (Sign In)
            <i class="bi bi-box-arrow-in-right fs-4"></i>
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer bg-dark-navy bg-opacity-25 border-top border-secondary p-4 text-center">
      <p class="mb-0 text-white small">
        ยังไม่มีบัญชีผู้ใช้? 
        <a href="https://www.facebook.com/chatchawan.taja" class="text-cyan text-decoration-none fw-bold ms-1">ติดต่อผู้ดูแลระบบ</a>
      </p>
    </div>
  </div>

  <div class="mt-4 text-center">
    <p class="text-white x-small">Powered by Smart Assignment</p>
  </div>
</div>
