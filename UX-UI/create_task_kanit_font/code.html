<!DOCTYPE html>

<html class="dark" lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Task - TaskToGroup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#bac8dc",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0c0f0f",
                        "primary-fixed": "#d6e4f9",
                        "error-container": "#93000a",
                        "surface-elevated": "#1B263B",
                        "tertiary-fixed-dim": "#bbc6e2",
                        "surface-container": "#1e2020",
                        "tertiary-container": "#0f1a2e",
                        "on-background": "#e2e2e2",
                        "status-progress": "#00E5FF",
                        "surface-container-low": "#1a1c1c",
                        "status-pending": "#FFB703",
                        "on-secondary-fixed-variant": "#004f58",
                        "on-tertiary-fixed-variant": "#3c475d",
                        "primary-container": "#0d1b2a",
                        "surface": "#121414",
                        "secondary-fixed-dim": "#00daf3",
                        "error": "#ffb4ab",
                        "surface-tint": "#bac8dc",
                        "secondary-container": "#00e3fd",
                        "status-done": "#06D6A0",
                        "midnight-base": "#040911",
                        "inverse-surface": "#e2e2e2",
                        "surface-container-high": "#282a2b",
                        "on-primary": "#243141",
                        "on-secondary-container": "#00616d",
                        "on-primary-fixed": "#0f1c2c",
                        "on-tertiary": "#263046",
                        "on-primary-container": "#768497",
                        "background": "#121414",
                        "outline": "#8e9196",
                        "surface-variant": "#333535",
                        "secondary": "#bdf4ff",
                        "inverse-primary": "#525f71",
                        "tertiary": "#bbc6e2",
                        "surface-bright": "#37393a",
                        "primary-fixed-dim": "#bac8dc",
                        "on-tertiary-fixed": "#101b30",
                        "inverse-on-surface": "#2f3131",
                        "on-surface-variant": "#c4c6cc",
                        "on-surface": "#e2e2e2",
                        "secondary-fixed": "#9cf0ff",
                        "on-primary-fixed-variant": "#3a4859",
                        "on-secondary": "#00363d",
                        "on-tertiary-container": "#78839c",
                        "outline-variant": "#44474c",
                        "surface-container-highest": "#333535",
                        "on-secondary-fixed": "#001f24",
                        "on-error": "#690005",
                        "tertiary-fixed": "#d7e2ff",
                        "surface-dim": "#121414"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-tablet": "24px",
                        "gutter": "16px",
                        "container-max": "1024px",
                        "margin-mobile": "16px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Kanit", "sans-serif"],
                        "headline-sm": ["Kanit", "sans-serif"],
                        "headline-lg": ["Kanit", "sans-serif"],
                        "body-lg": ["Kanit", "sans-serif"],
                        "headline-md": ["Kanit", "sans-serif"],
                        "body-md": ["Kanit", "sans-serif"],
                        "label-md": ["Kanit", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #040911; /* midnight-base */
            color: #e2e2e2; /* on-background */
        }
        /* Custom scrollbar for textareas */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1b2a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #323F52; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00E5FF; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-lg text-body-lg antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-primary-container dark:bg-primary-container text-secondary-fixed dark:text-secondary-fixed font-headline-md text-headline-md border-b border-outline-variant flex justify-between items-center px-margin-mobile md:px-margin-tablet w-full h-16 sticky top-0 z-50">
<button class="text-secondary-fixed hover:bg-surface-variant transition-colors duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-secondary-fixed text-center flex-grow">Create Task</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow p-margin-mobile md:p-margin-tablet w-full max-w-container-max mx-auto pb-32">
<form class="space-y-6">
<!-- Task Title -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="task_title">หัวข้องาน (Task Title)</label>
<input class="w-full bg-surface-elevated border border-[#323F52] rounded text-on-surface p-3 font-body-md text-body-md focus:outline-none focus:border-status-progress focus:ring-1 focus:ring-status-progress transition-colors placeholder:text-on-primary-container" id="task_title" placeholder="ระบุหัวข้องาน" type="text"/>
</div>
<!-- Category -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="task_category">หมวดหมู่ (Category)</label>
<div class="relative">
<select class="w-full bg-surface-elevated border border-[#323F52] rounded text-on-surface p-3 font-body-md text-body-md focus:outline-none focus:border-status-progress focus:ring-1 focus:ring-status-progress transition-colors appearance-none cursor-pointer" id="task_category">
<option disabled="" selected="" value="">เลือกหมวดหมู่</option>
<option value="engineering">Engineering</option>
<option value="sales">Sales</option>
<option value="it_support">IT Support</option>
<option value="product">Product</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Priority -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant mb-2">ความสำคัญ (Priority)</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="priority" type="radio" value="low"/>
<div class="text-center p-3 rounded border border-[#323F52] bg-surface-elevated text-on-surface-variant font-body-md text-body-md peer-checked:border-tertiary-fixed-dim peer-checked:bg-tertiary-fixed-dim/20 peer-checked:text-tertiary-fixed-dim transition-all hover:border-outline">
                            Low
                        </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="priority" type="radio" value="medium"/>
<div class="text-center p-3 rounded border border-[#323F52] bg-surface-elevated text-on-surface-variant font-body-md text-body-md peer-checked:border-status-pending peer-checked:bg-status-pending/20 peer-checked:text-status-pending transition-all hover:border-outline">
                            Medium
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="priority" type="radio" value="high"/>
<div class="text-center p-3 rounded border border-[#323F52] bg-surface-elevated text-on-surface-variant font-body-md text-body-md peer-checked:border-[#ff9800] peer-checked:bg-[#ff9800]/20 peer-checked:text-[#ff9800] transition-all hover:border-outline">
                            High
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="priority" type="radio" value="urgent"/>
<div class="text-center p-3 rounded border border-[#323F52] bg-surface-elevated text-on-surface-variant font-body-md text-body-md peer-checked:border-error peer-checked:bg-error/20 peer-checked:text-error transition-all hover:border-outline">
                            Urgent
                        </div>
</label>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="task_description">รายละเอียด (Description)</label>
<textarea class="w-full bg-surface-elevated border border-[#323F52] rounded text-on-surface p-3 font-body-md text-body-md focus:outline-none focus:border-status-progress focus:ring-1 focus:ring-status-progress transition-colors placeholder:text-on-primary-container resize-y" id="task_description" placeholder="ระบุรายละเอียดของงาน..." rows="4"></textarea>
</div>
<!-- Attachments -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant">แนบไฟล์ (Attachments)</label>
<div class="w-full border-2 border-dashed border-[#323F52] rounded-lg bg-surface-elevated flex flex-col items-center justify-center p-6 text-center hover:border-status-progress transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-status-progress transition-colors mb-2" data-icon="cloud_upload">cloud_upload</span>
<p class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">คลิกเพื่ออัปโหลด หรือลากไฟล์มาวางที่นี่</p>
<p class="font-label-md text-label-md text-on-primary-container mt-1">PNG, JPG, PDF (Max 10MB)</p>
</div>
</div>
<!-- Reward/Points -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="task_points">คะแนนรางวัล (Reward Points) - <i>Optional</i></label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-status-pending">
<span class="material-symbols-outlined" data-icon="stars">stars</span>
</div>
<input class="w-full bg-surface-elevated border border-[#323F52] rounded text-on-surface py-3 pr-3 pl-10 font-body-md text-body-md focus:outline-none focus:border-status-progress focus:ring-1 focus:ring-status-progress transition-colors placeholder:text-on-primary-container" id="task_points" min="0" placeholder="0" type="number"/>
</div>
</div>
</form>
</main>
<!-- Floating Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-elevated border-t border-[#323F52] p-margin-mobile md:p-margin-tablet z-50 flex justify-end gap-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.5)]">
<button class="px-6 py-3 rounded border border-status-progress text-status-progress font-headline-sm text-headline-sm hover:bg-status-progress/10 transition-colors focus:outline-none focus:ring-2 focus:ring-status-progress focus:ring-offset-2 focus:ring-offset-midnight-base" type="button">
            ยกเลิก (Cancel)
        </button>
<button class="px-6 py-3 rounded bg-status-progress text-midnight-base font-headline-sm text-headline-sm font-bold hover:bg-secondary-container transition-colors shadow-lg shadow-status-progress/20 focus:outline-none focus:ring-2 focus:ring-status-progress focus:ring-offset-2 focus:ring-offset-midnight-base flex items-center gap-2" type="button">
            สร้างและแจ้งเตือน (Create &amp; Notify)
            <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</body></html>
